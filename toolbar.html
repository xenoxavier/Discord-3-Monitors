<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; style-src 'self' 'unsafe-inline'">
  <title>Discord Monitor</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      height: 50px;
      background: #0d0f14;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 14px 0 78px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
      border-bottom: 1px solid rgba(255, 255, 255, 0.05);
      -webkit-user-select: none;
      -webkit-app-region: drag;
      color: #e2e8f0;
      overflow: hidden;
    }

    /* ── Left ── */
    .left {
      display: flex;
      align-items: center;
      gap: 14px;
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .logo-icon {
      width: 18px;
      height: 18px;
      flex-shrink: 0;
    }

    .logo-text {
      font-size: 13px;
      font-weight: 650;
      color: #f1f5f9;
      letter-spacing: -0.015em;
    }

    .divider {
      width: 1px;
      height: 18px;
      background: rgba(255, 255, 255, 0.09);
      border-radius: 1px;
    }

    /* ── Instance segmented control ── */
    .instance-control {
      display: flex;
      align-items: center;
      gap: 7px;
      -webkit-app-region: no-drag;
    }

    .instance-label {
      font-size: 10.5px;
      font-weight: 600;
      color: #475569;
      text-transform: uppercase;
      letter-spacing: 0.07em;
    }

    .instance-buttons {
      display: flex;
      gap: 2px;
      background: #161b27;
      border-radius: 7px;
      padding: 2px;
      border: 1px solid rgba(255, 255, 255, 0.07);
    }

    .instance-btn {
      width: 26px;
      height: 22px;
      border: none;
      border-radius: 5px;
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      background: transparent;
      color: #475569;
      transition: background 150ms ease, color 150ms ease;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: inherit;
    }

    .instance-btn:hover:not(.active) {
      background: rgba(255, 255, 255, 0.07);
      color: #94a3b8;
    }

    .instance-btn.active {
      background: #5865f2;
      color: #ffffff;
    }

    .instance-btn:active {
      transform: scale(0.95);
    }

    .instance-btn:focus-visible {
      outline: 2px solid #5865f2;
      outline-offset: 2px;
    }

    /* ── Right ── */
    .right {
      display: flex;
      align-items: center;
      gap: 6px;
      -webkit-app-region: no-drag;
    }

    .kbd-hint {
      display: flex;
      align-items: center;
      gap: 5px;
      color: #334155;
      font-size: 11px;
    }

    kbd {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-bottom-width: 2px;
      border-radius: 4px;
      padding: 1px 5px;
      font-size: 10px;
      font-family: inherit;
      color: #475569;
      letter-spacing: 0.01em;
    }

    .kbd-hint-text {
      color: #334155;
    }

    .sidebar-indicator {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: #475569;
      transition: background 200ms ease;
      margin-right: 2px;
    }

    .sidebar-indicator.hidden {
      background: #5865f2;
    }

    /* ── Status dots ── */
    .status-dots {
      display: flex;
      align-items: center;
      gap: 5px;
      margin-right: 8px;
    }

    .pane-status {
      display: flex;
      align-items: center;
      gap: 3px;
    }

    .pane-status-label {
      font-size: 9px;
      font-weight: 600;
      color: #334155;
      letter-spacing: 0.03em;
    }

    .status-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: #475569;
      transition: background 300ms ease;
    }

    .status-dot.loading {
      background: #eab308;
    }

    .status-dot.loaded {
      background: #22c55e;
    }

    .status-dot.error {
      background: #ef4444;
    }
  </style>
</head>
<body>
  <div class="left">
    <div class="logo">
      <!-- Monitor icon -->
      <svg class="logo-icon" viewBox="0 0 18 18" fill="none" xmlns="http://www.w3.org/2000/svg">
        <rect x="1.5" y="2.5" width="15" height="10" rx="1.5" stroke="#5865F2" stroke-width="1.4"/>
        <path d="M6.5 15.5h5M9 12.5v3" stroke="#5865F2" stroke-width="1.4" stroke-linecap="round"/>
        <circle cx="5.5" cy="7.5" r="1.5" fill="#5865F2" opacity="0.7"/>
        <circle cx="9" cy="7.5" r="1.5" fill="#5865F2" opacity="0.85"/>
        <circle cx="12.5" cy="7.5" r="1.5" fill="#5865F2"/>
      </svg>
      <span class="logo-text">Discord Monitor</span>
    </div>

    <div class="divider"></div>

    <div class="instance-control">
      <span class="instance-label">Panes</span>
      <div class="instance-buttons" role="group" aria-label="Toggle Discord panes">
        <button class="instance-btn active" data-pane="0" aria-label="Toggle pane 1" aria-pressed="true">1</button>
        <button class="instance-btn active" data-pane="1" aria-label="Toggle pane 2" aria-pressed="true">2</button>
        <button class="instance-btn active" data-pane="2" aria-label="Toggle pane 3" aria-pressed="true">3</button>
      </div>
    </div>
  </div>

  <div class="right">
    <div class="status-dots" id="status-dots">
      <div class="pane-status" data-pane="0"><span class="pane-status-label">1</span><div class="status-dot loading"></div></div>
      <div class="pane-status" data-pane="1"><span class="pane-status-label">2</span><div class="status-dot loading"></div></div>
      <div class="pane-status" data-pane="2"><span class="pane-status-label">3</span><div class="status-dot loading"></div></div>
    </div>
    <div class="kbd-hint">
      <kbd id="pane-shortcut">⌘1-3</kbd>
      <span class="kbd-hint-text">focus</span>
      <span class="kbd-divider" style="color:#1e293b;margin:0 2px;">|</span>
      <div class="sidebar-indicator" id="sidebar-indicator" title="Sidebars visible"></div>
      <kbd id="shortcut-key">⌘B</kbd>
      <span class="kbd-hint-text">sidebars</span>
      <span class="kbd-divider" style="color:#1e293b;margin:0 2px;">|</span>
      <kbd id="toolbar-shortcut">⌘T</kbd>
      <span class="kbd-hint-text">toolbar</span>
    </div>
  </div>

  <script src="toolbar-renderer.js"></script>
</body>
</html>
